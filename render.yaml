services:
  - type: web
    name: blog-generator-api
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: N8N_TIMEOUT_SECONDS
        value: "120"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
